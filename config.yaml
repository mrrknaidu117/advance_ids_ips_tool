# Advanced IDS/IPS Configuration - Production Ready
# Database Configuration
mysql:
  host: localhost
  user: root
  password: "<PASSWORD>"
  database: ids_ips_db
  pool_size: 10
  port: 3306

# Paths
DATASET_PATH: dataset
MODEL_PATH: model
LOG_PATH: logs
EXPORT_PATH: exports

# VirusTotal API Configuration
virustotal:
  api_key: "<APIKEY>"
  enabled: true
  rate_limit: 4  # requests per minute for free tier
  timeout: 10
  cache_duration: 3600  # seconds
  malicious_threshold: 0.05  # 5% threshold for malicious detection

# Network Scanning Configuration
scanning:
  mode: "production"  # "production" or "testing"
  interfaces_auto_detect: true
  packet_timeout: 5
  max_packets_per_second: 1000
  buffer_size: 65536
  
# Capture Interfaces (will auto-detect if interfaces_auto_detect is true)
CAPTURE_INTERFACES:
 "

# Security Configuration
security:
  auto_block_enabled: true
  block_duration_hours: 24
  max_login_attempts: 3
  session_timeout_minutes: 60
  require_strong_passwords: true
  
  # Threat Detection Settings
  detection_sensitivity: "medium"  # low, medium, high, paranoid
  ml_confidence_threshold: 0.7
  
  # IP Whitelisting
  whitelist_enabled: true
  whitelist_ips:
    - "127.0.0.1"
    - "::1"  
    
# Performance Settings
performance:
  max_memory_mb: 1024
  max_cpu_percent: 80
  cleanup_interval_hours: 6
  log_retention_days: 30
  max_concurrent_scans: 50
  
# Alerting Configuration
alerting:
  enabled: true
  desktop_notifications: true
  sound_alerts: false
  email_alerts: false  # Configure SMTP settings below when enabled
  
  # Alert Thresholds
  high_priority_threshold: 10
  alert_cooldown_seconds: 60
  
# SMTP Configuration (for email alerts)
smtp:
  enabled: false
  host: "smtp.gmail.com"
  port: 587
  username: ""
  password: ""
  from_email: ""
  to_emails: []
  
# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  max_file_size_mb: 100
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
# Export Configuration
export:
  default_format: "csv"
  include_charts: true
  include_system_info: true
  auto_timestamp: true
  compression: "zip"
