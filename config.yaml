  - "\\Device\\NPF_{B95ECAB7-5B68-4261-A1AE-1EDF7D0C6C8D}"
  - "\\Device\\NPF_{FEDA6EE5-D9FB-4457-AC02-06D4A1FB8A1C}"
  - "\\Device\\NPF_{CB2464A7-2776-486A-859F-255D0C5A3644}"
  - "\\Device\\NPF_{5481776E-5EBF-4F82-8303-83D5A4D1C196}"
  - "\\Device\\NPF_{36C30AA7-6217-449C-9E2B-1D8C6CED1507}"
